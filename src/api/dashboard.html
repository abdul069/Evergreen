<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evergreen</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#c8a96e;--dark:#080808;--surface:#0f0f0f;--border:#1a1a1a;--text:#e8e8e8;--muted:#555;--green:#2ecc71;--red:#e74c3c}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(200,169,110,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(200,169,110,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
.wrap{max-width:720px;margin:0 auto;padding:0 16px;position:relative;z-index:1}
header{padding:28px 16px 20px;border-bottom:1px solid var(--border)}
.hi{max-width:720px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.ld{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:pulse 2s infinite}
.lt{font-size:20px;font-weight:800;letter-spacing:-0.02em}
.lt span{color:var(--gold)}
.srv{display:flex;align-items:center;gap:8px;font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--muted)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--muted)}
.sdot.alive{background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tabs{display:flex;gap:4px;margin:20px 0 16px;border-bottom:1px solid var(--border)}
.tab{padding:10px 16px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px;font-family:'IBM Plex Mono',monospace;letter-spacing:.05em;text-transform:uppercase}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.panel{display:none}
.panel.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px}
.ct{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-family:'IBM Plex Mono',monospace}
.field input,.field textarea{width:100%;background:#0a0a0a;border:1px solid var(--border);border-radius:8px;padding:11px 13px;color:var(--text);font-family:'Syne',sans-serif;font-size:15px;transition:border-color .2s;-webkit-appearance:none}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--gold)}
.field textarea{resize:vertical;min-height:90px;line-height:1.6}
.field input::placeholder,.field textarea::placeholder{color:#333}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{padding:13px 22px;border:none;border-radius:8px;font-size:15px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:all .2s}
.btn:active{transform:scale(.98)}
.btn-gold{background:var(--gold);color:#080808;width:100%;margin-top:6px}
.btn-gold:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
.btn-sm{padding:8px 14px;font-size:13px;width:auto;margin-top:0}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px 22px;font-size:14px;z-index:999;transition:transform .3s ease;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:var(--green);color:var(--green)}
#toast.err{border-color:var(--red);color:var(--red)}
.vc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
.vc:hover{border-color:#333}
.vc.sel{border-color:var(--gold)}
.vh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px}
.vn{font-size:16px;font-weight:700}
.vs{font-size:11px;font-family:'IBM Plex Mono',monospace;padding:4px 10px;border-radius:4px;font-weight:600;letter-spacing:.05em;white-space:nowrap}
.s-active{background:rgba(46,204,113,.15);color:var(--green)}
.s-bootstrapping{background:rgba(200,169,110,.15);color:var(--gold)}
.s-paused{background:rgba(85,85,85,.3);color:var(--muted)}
.vi{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:14px}
.vst{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.st{text-align:center;padding:10px;background:#0a0a0a;border-radius:6px}
.sv{font-size:18px;font-weight:700;color:var(--gold)}
.sl{font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.bb{background:var(--border);border-radius:4px;height:5px;margin-top:10px;overflow:hidden}
.bf{height:100%;background:var(--gold);border-radius:4px}
.li{display:flex;align-items:center;gap:8px;font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--muted);margin-top:4px;flex-wrap:wrap}
.pb{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted);background:#111;padding:2px 7px;border-radius:4px}
.ds{margin-bottom:22px}
.dt{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.di{padding:11px;background:#0a0a0a;border-radius:6px;margin-bottom:7px;border-left:3px solid transparent}
.di.ok{border-left-color:var(--green)}
.di.fail{border-left-color:var(--red)}
.dtype{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--muted);margin-bottom:4px}
.dreason{font-size:13px;color:#aaa;line-height:1.5}
.dlearn{font-size:12px;color:var(--gold);margin-top:5px;font-style:italic}
.lea{padding:10px 13px;background:rgba(200,169,110,.05);border:1px solid rgba(200,169,110,.1);border-radius:6px;margin-bottom:7px;font-size:13px;color:#aaa;line-height:1.5}
.lcat{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--gold);margin-bottom:3px;text-transform:uppercase}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.mi{background:#0a0a0a;border-radius:8px;padding:13px}
.mv{font-size:20px;font-weight:700}
.ml{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:3px;text-transform:uppercase}
.back{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;cursor:pointer;margin-bottom:18px;font-family:'IBM Plex Mono',monospace}
.back:hover{color:var(--text)}
.rfbtn{display:flex;align-items:center;gap:6px;font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--muted);cursor:pointer;padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:transparent;margin-bottom:14px}
.rfbtn:hover{border-color:var(--gold);color:var(--gold)}
.spin{animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.scrl{max-height:360px;overflow-y:auto}
.empty{text-align:center;padding:40px 24px;color:var(--muted)}
.empty-i{font-size:36px;margin-bottom:14px;opacity:.3}
.loading{text-align:center;padding:28px;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:13px}
.pb-24{padding-bottom:80px}
</style>
</head>
<body>
<header>
<div class="hi">
<div class="logo"><div class="ld"></div><div class="lt">Ever<span>green</span></div></div>
<div class="srv"><div class="sdot" id="sdot"></div><span id="stxt">verbinden...</span></div>
</div>
</header>
<div class="wrap pb-24">
<div class="tabs">
<div class="tab active" onclick="goTab('ventures')">Ventures</div>
<div class="tab" onclick="goTab('new')">+ Nieuw</div>
</div>
<div class="panel active" id="panel-ventures">
<div id="detail-view" style="display:none"><div class="back" onclick="closeD()">&#8592; Terug</div><div id="dc"></div></div>
<div id="list-view">
<button class="rfbtn" onclick="loadV()"><span id="ri">&#8635;</span> Vernieuwen</button>
<div id="vlist"><div class="loading">Laden...</div></div>
</div>
</div>
<div class="panel" id="panel-new">
<div class="card">
<div class="ct">Nieuwe Intentie</div>
<div class="field"><label>Intentie *</label><textarea id="intent" placeholder="Beschrijf wat Evergreen moet bereiken..."></textarea></div>
<div class="row">
<div class="field"><label>Budget (EUR)</label><input type="number" id="budget" value="200"></div>
<div class="field"><label>Goedkeuring boven</label><input type="number" id="threshold" value="50"></div>
</div>
<div class="field"><label>E-mail *</label><input type="email" id="oemail" placeholder="jij@email.com"></div>
<button class="btn btn-gold" id="lbtn" onclick="launch()">&#127807; Venture lanceren</button>
</div>
<div class="card" style="background:transparent;border-color:rgba(200,169,110,.1);cursor:pointer" onclick="useEx()">
<div class="ct">Voorbeeld &#8212; klik om te gebruiken</div>
<div style="font-size:13px;color:var(--muted);line-height:1.7">"Zoek 10 Belgische accountantskantoren die nood hebben aan digitale tools en contacteer ze. Focus op Oost- en West-Vlaanderen."</div>
</div>
</div>
</div>
<div id="toast"></div>
<script>
var sel=null;

function api(path,opts){
  return fetch(path,opts).then(function(r){return r.json()});
}

function health(){
  var dot=document.getElementById('sdot'),txt=document.getElementById('stxt');
  fetch('/health').then(function(r){
    if(r.ok){dot.className='sdot alive';txt.textContent='online'}else throw 0;
  }).catch(function(){dot.className='sdot';txt.textContent='offline'});
}

function goTab(t){
  document.querySelectorAll('.tab').forEach(function(el,i){
    el.classList.toggle('active',['ventures','new'][i]===t);
  });
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
  document.getElementById('panel-'+t).classList.add('active');
  if(t==='ventures')loadV();
}

function loadV(silent){
  if(!silent){
    document.getElementById('ri').classList.add('spin');
    document.getElementById('vlist').innerHTML='<div class="loading">Laden...</div>';
  }
  api('/ventures').then(function(d){
    renderV(d.ventures||[]);
  }).catch(function(){
    document.getElementById('vlist').innerHTML='<div class="empty"><div class="empty-i">&#9888;</div><p>Kan server niet bereiken</p></div>';
  }).finally(function(){document.getElementById('ri').classList.remove('spin')});
}

function renderV(list){
  var el=document.getElementById('vlist');
  if(!list.length){
    el.innerHTML='<div class="empty"><div class="empty-i">&#127807;</div><p>Nog geen ventures. Maak je eerste aan.</p></div>';
    return;
  }
  el.innerHTML=list.map(function(v){
    var pct=Math.min(100,Math.round(((v.budget_spent||0)/v.budget_total)*100));
    return '<div class="vc'+(sel===v.id?' sel':'')+'" onclick="openD(\''+v.id+'\')">'+
      '<div class="vh"><div><div class="vn">'+(v.project_name||'Opstarten...')+'</div>'+
      '<div class="li"><span class="pb">'+v.phase+'</span><span>Loop #'+v.loop_count+'</span></div></div>'+
      '<div class="vs s-'+v.status+'">'+v.status.toUpperCase()+'</div></div>'+
      '<div class="vi">'+trunc(v.evolved_intent||v.original_intent,120)+'</div>'+
      '<div class="vst">'+
      '<div class="st"><div class="sv">&#8364;'+(v.revenue_total||0)+'</div><div class="sl">Omzet</div></div>'+
      '<div class="st"><div class="sv">&#8364;'+(v.budget_total-(v.budget_spent||0)).toFixed(0)+'</div><div class="sl">Budget</div></div>'+
      '<div class="st"><div class="sv">'+v.loop_count+'</div><div class="sl">Cycli</div></div>'+
      '</div>'+
      '<div class="bb"><div class="bf" style="width:'+pct+'%"></div></div>'+
      '</div>';
  }).join('');
}

function openD(id){
  sel=id;
  document.getElementById('list-view').style.display='none';
  document.getElementById('detail-view').style.display='block';
  document.getElementById('dc').innerHTML='<div class="loading">Laden...</div>';
  api('/ventures/'+id).then(function(d){renderD(d)}).catch(function(){
    document.getElementById('dc').innerHTML='<div class="empty"><p>Fout bij laden</p></div>';
  });
}

function closeD(){
  sel=null;
  document.getElementById('list-view').style.display='block';
  document.getElementById('detail-view').style.display='none';
  loadV();
}

function renderD(data){
  var v=data.venture,m=data.metrics||{},dec=data.recent_decisions||[],lea=data.recent_learnings||[],br=data.budget_remaining||0;
  var pct=Math.min(100,Math.round(((v.budget_total-br)/v.budget_total)*100));
  var ip=v.status==='paused';
  var h='<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:10px">'+
    '<div><h2 style="font-size:20px;font-weight:800">'+(v.project_name||'Opstarten...')+'</h2>'+
    '<div class="li" style="margin-top:4px">'+
    '<span class="vs s-'+v.status+'">'+v.status.toUpperCase()+'</span>'+
    '<span class="pb">'+v.phase+'</span>'+
    '<span>Loop #'+v.loop_count+'</span></div></div>'+
    '<button class="btn btn-sm btn-outline" onclick="'+(ip?'resumeV':'pauseV')+'(\''+v.id+'\')">'+
    (ip?'&#9654; Hervatten':'&#9646;&#9646; Pauzeren')+'</button></div>'+
    '<div class="ds"><div class="dt">Intentie</div>'+
    '<div style="font-size:14px;color:#aaa;line-height:1.7;background:#0a0a0a;padding:13px;border-radius:8px">'+
    (v.evolved_intent||v.original_intent)+'</div></div>'+
    '<div class="ds"><div class="dt">Budget</div><div class="mg">'+
    '<div class="mi"><div class="mv">&#8364;'+br.toFixed(2)+'</div><div class="ml">Resterend</div></div>'+
    '<div class="mi"><div class="mv">&#8364;'+(v.revenue_total||0)+'</div><div class="ml">Omzet</div></div>'+
    '<div class="mi"><div class="mv">&#8364;'+(v.budget_spent||0)+'</div><div class="ml">Uitgegeven</div></div>'+
    '<div class="mi"><div class="mv">&#8364;'+v.budget_total+'</div><div class="ml">Totaal</div></div>'+
    '</div><div class="bb" style="height:8px;margin-top:12px">'+
    '<div class="bf" style="width:'+pct+'%"></div></div></div>';

  if(Object.keys(m).length){
    h+='<div class="ds"><div class="dt">Metrics</div><div class="mg">';
    Object.entries(m).slice(0,6).forEach(function(e){
      h+='<div class="mi"><div class="mv">'+(typeof e[1]==='number'?e[1].toFixed(0):e[1])+'</div>'+
        '<div class="ml">'+String(e[0]).replace(/_/g,' ')+'</div></div>';
    });
    h+='</div></div>';
  }

  h+='<div class="ds"><div class="dt">Beslissingen ('+dec.length+')</div>';
  if(dec.length){
    h+='<div class="scrl">';
    dec.forEach(function(d){
      h+='<div class="di'+(d.success===true?' ok':d.success===false?' fail':'')+'">'+
        '<div class="dtype">'+d.level.toUpperCase()+' - '+d.action_type+
        ' '+(d.success===true?'&#10003;':d.success===false?'&#10007;':'&#8987;')+'</div>'+
        '<div class="dreason">'+trunc(d.reasoning,150)+'</div>'+
        (d.learnings?'<div class="dlearn">&#8594; '+trunc(d.learnings,100)+'</div>':'')+
        '</div>';
    });
    h+='</div>';
  } else h+='<div style="color:var(--muted);font-size:13px">Nog geen beslissingen</div>';
  h+='</div>';

  h+='<div class="ds"><div class="dt">Inzichten ('+lea.length+')</div>';
  if(lea.length){
    h+='<div class="scrl">';
    lea.forEach(function(l){
      h+='<div class="lea"><div class="lcat">'+l.category+'</div>'+l.insight+'</div>';
    });
    h+='</div>';
  } else h+='<div style="color:var(--muted);font-size:13px">Nog geen inzichten</div>';
  h+='</div>';

  h+='<div class="ds"><div class="dt">Tijdlijn</div>'+
    '<div style="font-size:12px;font-family:IBM Plex Mono,monospace;color:var(--muted);line-height:2.2">'+
    '<div>Aangemaakt: '+fmtD(v.created_at)+'</div>'+
    '<div>Laatste activiteit: '+fmtD(v.last_active_at)+'</div>'+
    (v.last_loop_at?'<div>Laatste loop: '+fmtD(v.last_loop_at)+'</div>':'')+
    '</div></div>';

  document.getElementById('dc').innerHTML=h;
}

function pauseV(id){
  fetch('/ventures/'+id+'/pause',{method:'POST'})
    .then(function(){toast('Gepauzeerd','ok');openD(id)})
    .catch(function(){toast('Fout','err')});
}

function resumeV(id){
  fetch('/ventures/'+id+'/resume',{method:'POST'})
    .then(function(){toast('Hervat','ok');openD(id)})
    .catch(function(){toast('Fout','err')});
}

function launch(){
  var intent=document.getElementById('intent').value.trim();
  var budget=parseFloat(document.getElementById('budget').value)||200;
  var threshold=parseFloat(document.getElementById('threshold').value)||50;
  var email=document.getElementById('oemail').value.trim();
  if(!intent){toast('Intentie verplicht','err');return}
  if(!email){toast('E-mail verplicht','err');return}
  var btn=document.getElementById('lbtn');
  btn.disabled=true;btn.textContent='Lanceren...';
  fetch('/ventures',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({intent:intent,budget:budget,approval_threshold:threshold,owner_email:email})
  }).then(function(r){return r.json()}).then(function(d){
    if(d.success){
      toast('Venture gelanceerd!','ok');
      document.getElementById('intent').value='';
      goTab('ventures');
      setTimeout(loadV,2000);
    } else toast(d.error||'Fout','err');
  }).catch(function(){toast('Kan server niet bereiken','err')})
  .finally(function(){btn.disabled=false;btn.textContent='Venture lanceren'});
}

function useEx(){
  document.getElementById('intent').value='Zoek 10 Belgische accountantskantoren die nood hebben aan digitale tools en contacteer ze. Focus op Oost- en West-Vlaanderen.';
  goTab('new');
}

function trunc(s,n){if(!s)return '';return s.length>n?s.substring(0,n)+'...':s}
function fmtD(iso){if(!iso)return '-';var d=new Date(iso);return d.toLocaleDateString('nl-BE')+' '+d.toLocaleTimeString('nl-BE',{hour:'2-digit',minute:'2-digit'})}
function toast(msg,type){var el=document.getElementById('toast');el.textContent=msg;el.className='show '+(type||'');setTimeout(function(){el.className=''},3000)}

health();
loadV();
setInterval(function(){
  if(document.getElementById('panel-ventures').classList.contains('active')){
    if(sel)openD(sel);else loadV(true);
  }
},30000);
</script>
</body>
</html>
